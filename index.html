<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SONG, YOUNG MIN Guitar Lab - Premium</title>
    <style>
        :root {
            --navy: #1a2a6c;
            --orange: #ff9800;
            --bg: #e0e5ec; /* 입체감을 위한 배경색 */
            --white: #ffffff;
            --shadow: 9px 9px 16px rgb(163,177,198,0.6), -9px -9px 16px rgba(255,255,255, 0.5);
            --inner-shadow: inset 6px 6px 12px #c1c9d7, inset -6px -6px 12px #ffffff;
        }

        body { 
            font-family: 'Pretendard', sans-serif; 
            background: var(--bg); 
            margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; 
        }

        /* 메인 카드: 입체감 있는 블록 형태 */
        .app-card { 
            background: var(--bg); width: 92%; max-width: 420px; padding: 30px; 
            border-radius: 40px; box-shadow: var(--shadow); text-align: center;
        }

        .brand { font-size: 0.75rem; font-weight: 800; color: var(--navy); letter-spacing: 1.5px; margin-bottom: 20px; opacity: 0.7; }

        /* 시각화 영역: 안으로 파여 있는 느낌 */
        .display-area { 
            width: 100%; height: 110px; background: #222; border-radius: 20px; 
            position: relative; margin-bottom: 25px; display: flex; justify-content: center; 
            align-items: center; box-shadow: inset 0 5px 15px rgba(0,0,0,0.5);
        }
        
        #analog-view { width: 100%; height: 100%; position: relative; display: flex; justify-content: center; }
        .needle { width: 4px; height: 75px; background: var(--orange); position: absolute; bottom: 10px; border-radius: 2px; transform-origin: bottom center; transition: transform 0.1s ease-out; }

        #digital-view { width: 100%; display: none; justify-content: center; gap: 20px; }
        .led { width: 25px; height: 25px; background: #333; border-radius: 50%; transition: 0.1s; }
        .led.active { background: #00ff88; box-shadow: 0 0 20px #00ff88; }

        /* 버튼 스타일: 눌리는 물리적 느낌 구현 */
        .btn-row { display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; margin-bottom: 20px; }
        .btn { 
            padding: 12px; border: none; border-radius: 12px; background: var(--bg); 
            color: var(--navy); cursor: pointer; font-size: 0.85rem; font-weight: 700; 
            flex: 1; min-width: 60px; box-shadow: var(--shadow); transition: 0.2s;
        }
        .btn:active { box-shadow: var(--inner-shadow); transform: scale(0.98); }
        .btn.active { box-shadow: var(--inner-shadow); color: var(--orange); }

        /* 모드 전환 버튼 전용 */
        .mode-btn { border-radius: 20px; font-size: 0.7rem; padding: 8px 15px; margin: 0 5px 20px; }

        /* CLICK 버튼: 주황색 강조 */
        .btn-click { color: var(--orange); }
        .btn-click.on { background: var(--orange); color: white; box-shadow: inset 4px 4px 8px #c57600, inset -4px -4px 8px #ffba4d; }

        /* 슬라이더 라벨 및 디자인 */
        .slider-container { width: 100%; margin-bottom: 20px; text-align: left; }
        .slider-label { font-size: 0.8rem; font-weight: 800; color: var(--navy); margin-left: 5px; display: flex; justify-content: space-between; }
        .bpm-display { font-size: 3.5rem; font-weight: 900; color: var(--navy); text-align: center; margin: 10px 0; text-shadow: 2px 2px 5px rgba(0,0,0,0.05); }

        input[type="range"] { 
            width: 100%; height: 10px; border-radius: 5px; background: var(--bg); 
            box-shadow: var(--inner-shadow); appearance: none; outline: none; margin: 12px 0;
        }
        input[type="range"]::-webkit-slider-thumb { appearance: none; width: 20px; height: 20px; background: var(--navy); border-radius: 50%; cursor: pointer; box-shadow: 2px 2px 5px rgba(0,0,0,0.2); }

        /* 시작 버튼 */
        .start-btn { 
            width: 100%; padding: 20px; border: none; border-radius: 20px; 
            background: var(--navy); color: white; font-size: 1.3rem; font-weight: 800; 
            cursor: pointer; margin-top: 10px; box-shadow: 5px 5px 15px rgba(26, 42, 108, 0.4); transition: 0.2s;
        }
        .start-btn:active { transform: scale(0.97); box-shadow: 2px 2px 5px rgba(26, 42, 108, 0.4); }
    </style>
</head>
<body>

<div class="app-card">
    <div class="brand">SONG, YOUNG MIN GUITAR LAB</div>

    <div class="btn-row">
        <button id="btnAnalog" class="btn mode-btn active">ANALOG</button>
        <button id="btnDigital" class="btn mode-btn">DIGITAL</button>
    </div>

    <div class="display-area">
        <div id="analog-view">
            <div class="needle" id="needle"></div>
        </div>
        <div id="digital-view">
            <div class="led" id="led0"></div>
            <div class="led" id="led1"></div>
            <div class="led" id="led2"></div>
            <div class="led" id="led3"></div>
        </div>
    </div>

    <div class="slider-container">
        <div class="slider-label"><span>TEMPO</span> <span id="bpmTxt">120</span></div>
        <input type="range" id="tempoRange" min="40" max="250" value="120">
        <div class="bpm-display" id="mainBpm">120</div>
    </div>

    <div class="slider-container">
        <div class="slider-label"><span>VOLUME</span></div>
        <input type="range" id="volRange" min="0" max="100" value="80">
    </div>

    <div class="slider-label" style="margin-bottom: 10px;">TIME SIGNATURE</div>
    <div class="btn-row" id="timeBtns">
        <button class="btn" data-val="2">2/4</button>
        <button class="btn" data-val="3">3/4</button>
        <button class="btn active" data-val="4">4/4</button>
        <button class="btn" data-val="6">6/8</button>
    </div>

    <div class="btn-row">
        <button id="clickToggle" class="btn btn-click">CLICK (Same Sound)</button>
    </div>

    <button id="startBtn" class="start-btn">START</button>
</div>

<script>
    /* --- 변수 초기화 --- */
    let audioCtx = null;
    let isPlaying = false;
    let bpm = 120;
    let measure = 4;
    let currentTick = 0;
    let nextTickTime = 0;
    let timerID = null;
    let isSameSound = false; 
    let currentMode = 'analog';

    const needle = document.getElementById('needle');
    const startBtn = document.getElementById('startBtn');
    const mainBpm = document.getElementById('mainBpm');
    const bpmTxt = document.getElementById('bpmTxt');

    /* --- 소리 생성 및 재생 로직 --- */
    function playSound(time, tickIndex) {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        
        // 마디의 첫 박자 확인 (서브디비전 제거로 로직 단순화)
        const isFirstBeat = (tickIndex % measure) === 0;

        // 동일 소리 모드 체크
        osc.frequency.value = (isFirstBeat && !isSameSound) ? 1200 : 800;
        
        const vol = document.getElementById('volRange').value / 100;
        gain.gain.setValueAtTime(vol, time);
        gain.gain.exponentialRampToValueAtTime(0.001, time + 0.05);

        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start(time);
        osc.stop(time + 0.05);

        // 시각화 업데이트 스케줄링
        const delay = (time - audioCtx.currentTime) * 1000;
        setTimeout(() => updateVisuals(tickIndex % measure), delay);
    }

    /* --- 시각화 업데이트 --- */
    function updateVisuals(beatInMeasure) {
        if (currentMode === 'analog') {
            const angle = (currentTick % 2 === 0) ? -35 : 35;
            needle.style.transform = `translateX(-50%) rotate(${angle}deg)`;
        } else {
            // 디지털 LED 로직: 현재 박자에 맞게 깜빡임
            const leds = document.querySelectorAll('.led');
            leds.forEach((l, idx) => {
                l.classList.toggle('active', idx === (beatInMeasure % 4)); 
            });
        }
    }

    /* --- 스케줄러 --- */
    function scheduler() {
        while (nextTickTime < audioCtx.currentTime + 0.1) {
            playSound(nextTickTime, currentTick);
            nextTickTime += (60.0 / bpm);
            currentTick++;
        }
        timerID = requestAnimationFrame(scheduler);
    }

    /* --- 이벤트 리스너 --- */

    // 1. 아날로그/디지털 모드 전환
    document.getElementById('btnAnalog').addEventListener('click', function() {
        currentMode = 'analog';
        document.getElementById('analog-view').style.display = 'flex';
        document.getElementById('digital-view').style.display = 'none';
        this.classList.add('active');
        document.getElementById('btnDigital').classList.remove('active');
    });

    document.getElementById('btnDigital').addEventListener('click', function() {
        currentMode = 'digital';
        document.getElementById('analog-view').style.display = 'none';
        document.getElementById('digital-view').style.display = 'flex';
        this.classList.add('active');
        document.getElementById('btnAnalog').classList.remove('active');
    });

    // 2. Click (강박 제어)
    const clickToggle = document.getElementById('clickToggle');
    clickToggle.addEventListener('click', function() {
        isSameSound = !isSameSound;
        this.classList.toggle('on', isSameSound);
    });

    // 3. 타임 시그니처 버튼 (단일 관리로 오류 방지)
    const timeBtns = document.querySelectorAll('#timeBtns .btn');
    timeBtns.forEach(b => b.addEventListener('click', function() {
        document.querySelector('#timeBtns .active').classList.remove('active');
        this.classList.add('active');
        measure = parseInt(this.dataset.val);
        currentTick = 0; // 박자 변경 시 카운트 초기화
    }));

    // 4. 슬라이더 컨트롤
    document.getElementById('tempoRange').addEventListener('input', (e) => {
        bpm = e.target.value;
        bpmTxt.innerText = bpm;
        mainBpm.innerText = bpm;
    });

    // 5. 시작 버튼
    startBtn.addEventListener('click', () => {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        isPlaying = !isPlaying;
        if (isPlaying) {
            currentTick = 0;
            nextTickTime = audioCtx.currentTime;
            scheduler();
            startBtn.innerText = 'STOP';
        } else {
            cancelAnimationFrame(timerID);
            startBtn.innerText = 'START';
            document.querySelectorAll('.led').forEach(l => l.classList.remove('active'));
            needle.style.transform = `translateX(-50%) rotate(0deg)`;
        }
    });
</script>

</body>
</html>
