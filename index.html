<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SONG, YOUNG MIN Guitar Lab - Premium v2</title>
    <style>
        :root {
            --navy: #1a2a6c;
            --orange: #ff9800;
            --bg: #ebedef; /* 입체감을 살리는 밝은 회색 배경 */
            --white: #ffffff;
            /* 더 깊고 뚜렷한 그림자 설정 */
            --shadow-out: 8px 8px 15px #bebebe, -8px -8px 15px #ffffff;
            --shadow-in: inset 6px 6px 12px #bebebe, inset -6px -6px 12px #ffffff;
        }

        body { 
            font-family: 'Pretendard', sans-serif; 
            background: var(--bg); 
            margin: 0; display: flex; justify-content: center; align-items: center; 
            height: 100vh; overflow: hidden; /* 상하 여백 없이 꽉 차게 배치 */
        }

        .app-card { 
            background: var(--bg); width: 90%; max-width: 400px; 
            padding: 20px 25px; /* 상하 패딩을 줄여 압축 */
            border-radius: 40px; box-shadow: var(--shadow-out); text-align: center;
            display: flex; flex-direction: column; align-items: center;
        }

        .brand { font-size: 0.7rem; font-weight: 800; color: var(--navy); letter-spacing: 1px; margin-bottom: 15px; opacity: 0.8; }

        /* 시각화 영역 */
        .display-area { 
            width: 100%; height: 90px; background: #222; border-radius: 20px; 
            position: relative; margin-bottom: 15px; display: flex; justify-content: center; 
            align-items: center; box-shadow: inset 0 5px 15px rgba(0,0,0,0.4);
        }
        
        .needle { width: 4px; height: 65px; background: var(--orange); position: absolute; bottom: 8px; border-radius: 2px; transform-origin: bottom center; transition: transform 0.08s ease-out; }

        .led-row { display: none; justify-content: center; gap: 15px; width: 100%; }
        .led { width: 22px; height: 22px; background: #333; border-radius: 50%; }
        .led.active { background: #00ff88; box-shadow: 0 0 15px #00ff88; }

        /* 버튼: 그림자 대비를 높여 입체감 강화 */
        .btn-row { display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; width: 100%; }
        .btn { 
            padding: 10px; border: none; border-radius: 12px; background: var(--bg); 
            color: var(--navy); cursor: pointer; font-size: 0.8rem; font-weight: 700; 
            flex: 1; min-width: 55px; box-shadow: var(--shadow-out); transition: 0.1s;
        }
        /* 눌렸을 때 효과 극대화 */
        .btn:active { box-shadow: var(--shadow-in); transform: scale(0.96); }
        .btn.active { box-shadow: var(--shadow-in); color: var(--orange); }

        /* 미세조정 버튼 전용 */
        .adj-btn { flex: none; width: 35px; height: 35px; border-radius: 50%; font-size: 1.1rem; padding: 0; }

        /* 슬라이더 영역 간격 축소 */
        .slider-container { width: 100%; margin-bottom: 10px; }
        .slider-label { font-size: 0.75rem; font-weight: 800; color: var(--navy); margin-bottom: 5px; display: flex; justify-content: space-between; align-items: center; }
        .bpm-display { font-size: 3rem; font-weight: 900; color: var(--navy); margin: 2px 0; }

        input[type="range"] { 
            width: 100%; height: 8px; border-radius: 4px; background: var(--bg); 
            appearance: none; outline: none; margin: 8px 0; box-shadow: var(--shadow-in);
        }
        input[type="range"]::-webkit-slider-thumb { appearance: none; width: 20px; height: 20px; background: var(--navy); border-radius: 50%; cursor: pointer; }

        /* 시작 버튼 */
        .start-btn { 
            width: 100%; padding: 18px; border: none; border-radius: 20px; 
            background: var(--navy); color: white; font-size: 1.2rem; font-weight: 800; 
            cursor: pointer; margin-top: 5px; box-shadow: 4px 4px 10px rgba(26, 42, 108, 0.3); transition: 0.2s;
        }
        .start-btn:active { box-shadow: inset 2px 2px 5px rgba(0,0,0,0.5); transform: scale(0.98); }
    </style>
</head>
<body>

<div class="app-card">
    <div class="brand">SONG, YOUNG MIN GUITAR LAB</div>

    <div class="btn-row">
        <button id="btnAnalog" class="btn active">ANALOG</button>
        <button id="btnDigital" class="btn">DIGITAL</button>
    </div>

    <div class="display-area">
        <div id="analog-view" style="width:100%; display:flex; justify-content:center;">
            <div class="needle" id="needle"></div>
        </div>
        <div id="digital-view" class="led-row">
            <div class="led" id="led0"></div>
            <div class="led" id="led1"></div>
            <div class="led" id="led2"></div>
            <div class="led" id="led3"></div>
        </div>
    </div>

    <div class="slider-container">
        <div class="slider-label">
            <button class="btn adj-btn" id="tMinus">-</button>
            <span>TEMPO</span>
            <button class="btn adj-btn" id="tPlus">+</button>
        </div>
        <div class="bpm-display" id="mainBpm">120</div>
        <input type="range" id="tempoRange" min="40" max="250" value="120">
    </div>

    <div class="slider-container">
        <div class="slider-label">VOLUME</div>
        <input type="range" id="volRange" min="0" max="100" value="80">
    </div>

    <div class="btn-row" id="timeBtns">
        <button class="btn" data-val="2">2/4</button>
        <button class="btn" data-val="3">3/4</button>
        <button class="btn active" data-val="4">4/4</button>
        <button class="btn" data-val="6">6/8</button>
    </div>

    <div class="btn-row">
        <button id="clickToggle" class="btn" style="color: var(--orange);">CLICK (Same Sound)</button>
    </div>

    <button id="startBtn" class="start-btn">START</button>
</div>

<script>
    let audioCtx = null;
    let isPlaying = false;
    let bpm = 120;
    let measure = 4;
    let currentTick = 0;
    let nextTickTime = 0;
    let timerID = null;
    let isSameSound = false; 
    let currentMode = 'analog';

    const needle = document.getElementById('needle');
    const startBtn = document.getElementById('startBtn');
    const mainBpm = document.getElementById('mainBpm');
    const tempoRange = document.getElementById('tempoRange');

    /* --- 고음 클릭 소리 로직 --- */
    function playSound(time, tickIndex) {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        const isFirstBeat = (tickIndex % measure) === 0;

        osc.frequency.value = (isFirstBeat && !isSameSound) ? 2200 : 1300;
        osc.type = 'sine'; // 깔끔한 고음을 위해 다시 사인파로 설정
        
        const vol = document.getElementById('volRange').value / 100;
        gain.gain.setValueAtTime(vol, time);
        gain.gain.exponentialRampToValueAtTime(0.001, time + 0.04);

        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start(time);
        osc.stop(time + 0.04);

        const delay = (time - audioCtx.currentTime) * 1000;
        setTimeout(() => updateVisuals(tickIndex % measure), delay);
    }

    function updateVisuals(beatInMeasure) {
        if (currentMode === 'analog') {
            const angle = (currentTick % 2 === 0) ? -35 : 35;
            needle.style.transform = `translateX(-50%) rotate(${angle}deg)`;
        } else {
            const leds = document.querySelectorAll('.led');
            leds.forEach((l, idx) => {
                l.classList.toggle('active', idx === (beatInMeasure % 4)); 
            });
        }
    }

    function scheduler() {
        while (nextTickTime < audioCtx.currentTime + 0.1) {
            playSound(nextTickTime, currentTick);
            nextTickTime += (60.0 / bpm);
            currentTick++;
        }
        timerID = requestAnimationFrame(scheduler);
    }

    /* --- 템포 업데이트 함수 --- */
    function updateBpm(val) {
        bpm = Math.min(Math.max(val, 40), 250);
        tempoRange.value = bpm;
        mainBpm.innerText = bpm;
    }

    document.getElementById('tMinus').onclick = () => updateBpm(parseInt(bpm) - 1);
    document.getElementById('tPlus').onclick = () => updateBpm(parseInt(bpm) + 1);
    tempoRange.oninput = (e) => updateBpm(e.target.value);

    /* --- 모드 및 버튼 이벤트 --- */
    document.getElementById('btnAnalog').onclick = function() {
        currentMode = 'analog';
        document.getElementById('analog-view').style.display = 'flex';
        document.getElementById('digital-view').style.display = 'none';
        this.classList.add('active');
        document.getElementById('btnDigital').classList.remove('active');
    };

    document.getElementById('btnDigital').onclick = function() {
        currentMode = 'digital';
        document.getElementById('analog-view').style.display = 'none';
        document.getElementById('digital-view').style.display = 'flex';
        this.classList.add('active');
        document.getElementById('btnAnalog').classList.remove('active');
    };

    document.getElementById('clickToggle').onclick = function() {
        isSameSound = !isSameSound;
        this.classList.toggle('active', isSameSound);
    };

    const tBtns = document.querySelectorAll('#timeBtns .btn');
    tBtns.forEach(b => b.onclick = function() {
        document.querySelector('#timeBtns .active').classList.remove('active');
        this.classList.add('active');
        measure = parseInt(this.dataset.val);
        currentTick = 0;
    });

    startBtn.onclick = () => {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        isPlaying = !isPlaying;
        if (isPlaying) {
            currentTick = 0;
            nextTickTime = audioCtx.currentTime;
            scheduler();
            startBtn.innerText = 'STOP';
        } else {
            cancelAnimationFrame(timerID);
            startBtn.innerText = 'START';
            document.querySelectorAll('.led').forEach(l => l.classList.remove('active'));
            needle.style.transform = `translateX(-50%) rotate(0deg)`;
        }
    };
</script>

</body>
</html>
