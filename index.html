<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SONG, YOUNG MIN Guitar Lab - Professional</title>
    <style>
        :root {
            --navy: #1a2a6c;
            --orange: #ff9800; /* Click 버튼용 주황색 */
            --bg: #f4f7f6;
            --white: #ffffff;
            --led-off: #333;
            --led-on: #2ecc71;
        }

        body { 
            font-family: 'Pretendard', sans-serif; 
            background: var(--bg); 
            margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; 
        }

        .app-card { 
            background: var(--white); width: 95%; max-width: 450px; padding: 20px; 
            border-radius: 25px; box-shadow: 0 15px 40px rgba(0,0,0,0.1); text-align: center;
        }

        .brand { font-size: 0.7rem; font-weight: bold; color: var(--navy); letter-spacing: 2px; margin-bottom: 15px; }

        /* --- 인터페이스 전환 영역 --- */
        .display-area { width: 100%; height: 120px; background: #222; border-radius: 15px; position: relative; margin-bottom: 15px; display: flex; justify-content: center; align-items: center; }
        
        /* 아날로그 모드 (바늘) */
        #analog-view { width: 100%; height: 100%; position: relative; display: flex; justify-content: center; }
        .needle { width: 3px; height: 80px; background: var(--orange); position: absolute; bottom: 10px; transform-origin: bottom center; transition: transform 0.1s ease-out; }

        /* 디지털 모드 (LED) */
        #digital-view { width: 100%; display: none; justify-content: center; gap: 15px; }
        .led { width: 30px; height: 30px; background: var(--led-off); border-radius: 50%; box-shadow: inset 0 0 5px #000; }
        .led.active { background: var(--led-on); box-shadow: 0 0 15px var(--led-on); }

        /* --- 버튼 및 컨트롤 --- */
        .bpm-display { font-size: 3.5rem; font-weight: 900; color: var(--navy); margin: 0; }
        .label { font-size: 0.7rem; color: #888; margin: 10px 0 5px; font-weight: bold; text-transform: uppercase; }

        .btn-row { display: flex; justify-content: center; gap: 5px; flex-wrap: wrap; margin-bottom: 10px; }
        .btn { 
            padding: 8px 10px; border: 1.5px solid #eee; border-radius: 8px; background: #fff; 
            color: var(--navy); cursor: pointer; font-size: 0.75rem; font-weight: 600; flex: 1; min-width: 60px;
        }
        .btn.active { background: var(--navy); color: #fff; border-color: var(--navy); }

        /* Click(강박제어) 버튼 - 주황색 */
        .btn-click { background: #fff; border: 2px solid var(--orange); color: var(--orange); }
        .btn-click.on { background: var(--orange); color: white; }

        /* 모드 전환 버튼 (아날로그/디지털) */
        .mode-btn { background: #eee; border: none; padding: 10px 20px; border-radius: 20px; font-size: 0.8rem; cursor: pointer; margin: 0 5px; }
        .mode-btn.active { background: var(--navy); color: white; }

        input[type="range"] { width: 100%; accent-color: var(--navy); margin: 10px 0; }
        .start-btn { width: 100%; padding: 15px; border: none; border-radius: 12px; background: var(--navy); color: white; font-size: 1.2rem; font-weight: bold; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>

<div class="app-card">
    <div class="brand">SONG, YOUNG MIN GUITAR LAB</div>

    <div style="margin-bottom: 15px;">
        <button id="btnAnalog" class="mode-btn active">ANALOG</button>
        <button id="btnDigital" class="mode-btn">DIGITAL</button>
    </div>

    <div class="display-area">
        <div id="analog-view">
            <div class="needle" id="needle"></div>
        </div>
        <div id="digital-view">
            <div class="led" id="led0"></div>
            <div class="led" id="led1"></div>
            <div class="led" id="led2"></div>
            <div class="led" id="led3"></div>
        </div>
    </div>

    <div class="bpm-display" id="bpmTxt">120</div>
    <input type="range" id="tempoRange" min="40" max="250" value="120">
    <input type="range" id="volRange" min="0" max="100" value="80">

    <div class="label">Time Signature</div>
    <div class="btn-row" id="timeBtns">
        <button class="btn" data-val="1">1/2</button>
        <button class="btn" data-val="3">3/4</button>
        <button class="btn active" data-val="4">4/4</button>
        <button class="btn" data-val="6">6/8</button>
        <button class="btn" data-val="12">12/8</button>
    </div>

    <div class="label">Accent & Subdivision</div>
    <div class="btn-row">
        <button id="clickToggle" class="btn btn-click">CLICK (Same Sound)</button>
    </div>
    <div class="btn-row" id="subBtns">
        <button class="btn active" data-val="1">4분</button>
        <button class="btn" data-val="2">8분</button>
        <button class="btn" data-val="3">3연음</button>
        <button class="btn" data-val="4">16분</button>
    </div>

    <button id="startBtn" class="start-btn">START</button>
</div>

<script>
    /* --- 변수 초기화 --- */
    let audioCtx = null;
    let isPlaying = false;
    let bpm = 120;
    let measure = 4;
    let subdivision = 1;
    let currentTick = 0;
    let nextTickTime = 0;
    let timerID = null;
    let isSameSound = false; // Click 버튼 상태 (True면 모든 박 소리 동일)
    let currentMode = 'analog'; // 'analog' 또는 'digital'

    const needle = document.getElementById('needle');
    const startBtn = document.getElementById('startBtn');
    const bpmTxt = document.getElementById('bpmTxt');

    /* --- 소리 생성 로직 --- */
    function playSound(time, tickIndex) {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        
        // 강박 위치 계산: (전체 마디의 첫 박자)
        const isFirstBeat = (tickIndex % (measure * subdivision)) === 0;

        // 로직: isSameSound가 true면 무조건 800Hz, false면 첫박만 1200Hz
        osc.frequency.value = (isFirstBeat && !isSameSound) ? 1200 : 800;
        
        const vol = document.getElementById('volRange').value / 100;
        gain.gain.setValueAtTime(vol, time);
        gain.gain.exponentialRampToValueAtTime(0.001, time + 0.05);

        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start(time);
        osc.stop(time + 0.05);

        // 시각화 업데이트 스케줄링
        const delay = (time - audioCtx.currentTime) * 1000;
        setTimeout(() => {
            updateVisuals(tickIndex % (measure * subdivision));
        }, delay);
    }

    /* --- 인터페이스 업데이트 로직 --- */
    function updateVisuals(beatInMeasure) {
        if (currentMode === 'analog') {
            // 바늘침 좌우 이동
            const angle = (currentTick % 2 === 0) ? -35 : 35;
            needle.style.transform = `translateX(-50%) rotate(${angle}deg)`;
        } else {
            // LED 업데이트: 4/4 박자 등 분할에 맞춰 해당 LED 점등
            const ledIndex = Math.floor(beatInMeasure / subdivision) % 4; 
            document.querySelectorAll('.led').forEach((l, idx) => {
                l.classList.toggle('active', idx === ledIndex);
            });
        }
    }

    /* --- 스케줄러 --- */
    function scheduler() {
        while (nextTickTime < audioCtx.currentTime + 0.1) {
            playSound(nextTickTime, currentTick);
            nextTickTime += (60.0 / bpm / subdivision);
            currentTick++;
        }
        timerID = requestAnimationFrame(scheduler);
    }

    /* --- 이벤트 리스너 --- */

    // 1. 모드 전환 (아날로그 <-> 디지털)
    document.getElementById('btnAnalog').addEventListener('click', () => {
        currentMode = 'analog';
        document.getElementById('analog-view').style.display = 'flex';
        document.getElementById('digital-view').style.display = 'none';
        document.getElementById('btnAnalog').classList.add('active');
        document.getElementById('btnDigital').classList.remove('active');
    });

    document.getElementById('btnDigital').addEventListener('click', () => {
        currentMode = 'digital';
        document.getElementById('analog-view').style.display = 'none';
        document.getElementById('digital-view').style.display = 'flex';
        document.getElementById('btnDigital').classList.add('active');
        document.getElementById('btnAnalog').classList.remove('active');
    });

    // 2. Click (강박 제어) 버튼
    const clickToggle = document.getElementById('clickToggle');
    clickToggle.addEventListener('click', () => {
        isSameSound = !isSameSound;
        clickToggle.classList.toggle('on', isSameSound);
    });

    // 3. 박자 및 분할 버튼 공통 설정
    function setBtnGroup(groupId, callback) {
        const btns = document.querySelectorAll(`#${groupId} .btn`);
        btns.forEach(b => b.addEventListener('click', () => {
            document.querySelector(`#${groupId} .active`).classList.remove('active');
            b.classList.add('active');
            callback(b.dataset.val);
        }));
    }
    setBtnGroup('timeBtns', v => measure = parseInt(v));
    setBtnGroup('subBtns', v => subdivision = parseInt(val = v));

    // 4. 기타 컨트롤
    document.getElementById('tempoRange').addEventListener('input', (e) => {
        bpm = e.target.value;
        bpmTxt.innerText = bpm;
    });

    startBtn.addEventListener('click', () => {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        isPlaying = !isPlaying;
        if (isPlaying) {
            currentTick = 0;
            nextTickTime = audioCtx.currentTime;
            scheduler();
            startBtn.innerText = 'STOP';
        } else {
            cancelAnimationFrame(timerID);
            startBtn.innerText = 'START';
            document.querySelectorAll('.led').forEach(l => l.classList.remove('active'));
            needle.style.transform = `translateX(-50%) rotate(0deg)`;
        }
    });
</script>

</body>
</html>
