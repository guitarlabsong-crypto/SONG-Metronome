<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SONG, YOUNG MIN Guitar Lab - Dark Edition</title>
    <style>
        :root {
            --bg-dark: #1e1e1e;       /* 전체 배경 (진회색) */
            --card-bg: #2a2a2a;       /* 카드 배경 (중회색) */
            --navy-point: #3d5afe;    /* 포인트 네이비 */
            --orange-point: #ff6d00;  /* 포인트 주황 */
            --text-main: #e0e0e0;     /* 메인 글자색 */
            --shadow-out: 5px 5px 10px #151515, -5px -5px 10px #3f3f3f;
            --shadow-in: inset 3px 3px 6px #151515, inset -3px -3px 6px #3f3f3f;
        }

        body { 
            font-family: 'Pretendard', sans-serif; 
            background: var(--bg-dark); 
            margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; color: var(--text-main);
        }

        /* 메인 카드: 어두운 배경에서 도드라지는 블록 형태 */
        .app-card { 
            background: var(--card-bg); width: 92%; max-width: 420px; padding: 30px; 
            border-radius: 35px; box-shadow: var(--shadow-out); text-align: center;
        }

        .brand { font-size: 0.7rem; font-weight: 800; color: var(--navy-point); letter-spacing: 2px; margin-bottom: 20px; opacity: 0.8; }

        /* 시각화 영역 */
        .display-area { 
            width: 100%; height: 100px; background: #111; border-radius: 20px; 
            position: relative; margin-bottom: 20px; display: flex; justify-content: center; 
            align-items: center; box-shadow: inset 0 2px 10px rgba(0,0,0,0.8);
        }
        
        .needle { width: 3px; height: 70px; background: var(--orange-point); position: absolute; bottom: 8px; border-radius: 2px; transform-origin: bottom center; transition: transform 0.08s ease-out; }

        .led-row { display: none; justify-content: center; gap: 20px; width: 100%; }
        .led { width: 20px; height: 20px; background: #333; border-radius: 50%; transition: 0.1s; }
        .led.active { background: #00e676; box-shadow: 0 0 15px #00e676; }

        /* 버튼 스타일: 다크 모드에서의 입체감 강조 */
        .btn-row { display: flex; justify-content: center; gap: 12px; flex-wrap: wrap; margin-bottom: 20px; }
        .btn { 
            padding: 12px; border: none; border-radius: 12px; background: var(--card-bg); 
            color: var(--text-main); cursor: pointer; font-size: 0.85rem; font-weight: 700; 
            flex: 1; min-width: 60px; box-shadow: var(--shadow-out); transition: 0.1s;
        }
        .btn:active { box-shadow: var(--shadow-in); transform: scale(0.97); }
        .btn.active { box-shadow: var(--shadow-in); color: var(--orange-point); }

        /* 템포 미세 조정 버튼 */
        .adj-btn { width: 40px; height: 40px; border-radius: 50%; font-size: 1.2rem; flex: none; min-width: 40px; display: flex; align-items: center; justify-content: center; }

        /* 슬라이더 및 텍스트 */
        .slider-container { width: 100%; margin-bottom: 20px; }
        .slider-label { font-size: 0.8rem; font-weight: 800; color: #aaa; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .bpm-display { font-size: 4rem; font-weight: 900; color: var(--text-main); margin: 5px 0; letter-spacing: -2px; }

        input[type="range"] { 
            width: 100%; height: 8px; border-radius: 4px; background: #1a1a1a; 
            appearance: none; outline: none; margin: 15px 0; box-shadow: inset 2px 2px 5px #000;
        }
        input[type="range"]::-webkit-slider-thumb { appearance: none; width: 22px; height: 22px; background: var(--navy-point); border-radius: 50%; cursor: pointer; box-shadow: 0 0 10px rgba(0,0,0,0.5); }

        /* 시작 버튼 */
        .start-btn { 
            width: 100%; padding: 20px; border: none; border-radius: 20px; 
            background: var(--navy-point); color: white; font-size: 1.3rem; font-weight: 800; 
            cursor: pointer; margin-top: 10px; box-shadow: 0 10px 20px rgba(0,0,0,0.3); transition: 0.2s;
        }
        .start-btn:active { transform: scale(0.96); box-shadow: 0 5px 10px rgba(0,0,0,0.3); }
    </style>
</head>
<body>

<div class="app-card">
    <div class="brand">SONG, YOUNG MIN GUITAR LAB</div>

    <div class="btn-row">
        <button id="btnAnalog" class="btn active">ANALOG</button>
        <button id="btnDigital" class="btn">DIGITAL</button>
    </div>

    <div class="display-area">
        <div id="analog-view" style="width:100%; display:flex; justify-content:center;">
            <div class="needle" id="needle"></div>
        </div>
        <div id="digital-view" class="led-row">
            <div class="led" id="led0"></div>
            <div class="led" id="led1"></div>
            <div class="led" id="led2"></div>
            <div class="led" id="led3"></div>
        </div>
    </div>

    <div class="slider-container">
        <div class="slider-label">
            <button class="btn adj-btn" id="tempoMinus">-</button>
            <span style="font-size: 1rem; color: var(--navy-point);">TEMPO</span>
            <button class="btn adj-btn" id="tempoPlus">+</button>
        </div>
        <div class="bpm-display" id="mainBpm">120</div>
        <input type="range" id="tempoRange" min="40" max="250" value="120">
    </div>

    <div class="slider-container">
        <div class="slider-label"><span>VOLUME</span></div>
        <input type="range" id="volRange" min="0" max="100" value="80">
    </div>

    <div class="slider-label">TIME SIGNATURE</div>
    <div class="btn-row" id="timeBtns">
        <button class="btn" data-val="2">2/4</button>
        <button class="btn" data-val="3">3/4</button>
        <button class="btn active" data-val="4">4/4</button>
        <button class="btn" data-val="6">6/8</button>
    </div>

    <div class="btn-row">
        <button id="clickToggle" class="btn" style="color: var(--orange-point);">CLICK (Same Sound)</button>
    </div>

    <button id="startBtn" class="start-btn">START</button>
</div>

<script>
    let audioCtx = null;
    let isPlaying = false;
    let bpm = 120;
    let measure = 4;
    let currentTick = 0;
    let nextTickTime = 0;
    let timerID = null;
    let isSameSound = false; 
    let currentMode = 'analog';

    const needle = document.getElementById('needle');
    const startBtn = document.getElementById('startBtn');
    const mainBpm = document.getElementById('mainBpm');
    const tempoRange = document.getElementById('tempoRange');

    /* --- 개선된 고음 클릭 로직 --- */
    function playSound(time, tickIndex) {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        
        const isFirstBeat = (tickIndex % measure) === 0;

        // 주파수를 더 높여서 날카로운 고음 구현 (기존 1200->2000, 800->1200)
        osc.frequency.value = (isFirstBeat && !isSameSound) ? 2000 : 1200;
        osc.type = 'square'; // 더 선명한 클릭을 위해 파형을 square(사각파)로 변경 가능 (원치 않으면 'sine'으로 복구)
        
        const vol = document.getElementById('volRange').value / 100;
        gain.gain.setValueAtTime(vol, time);
        gain.gain.exponentialRampToValueAtTime(0.001, time + 0.04); // 소리 길이를 더 짧게(0.04) 잡아 '틱' 소리 강조

        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start(time);
        osc.stop(time + 0.04);

        const delay = (time - audioCtx.currentTime) * 1000;
        setTimeout(() => updateVisuals(tickIndex % measure), delay);
    }

    function updateVisuals(beatInMeasure) {
        if (currentMode === 'analog') {
            const angle = (currentTick % 2 === 0) ? -35 : 35;
            needle.style.transform = `translateX(-50%) rotate(${angle}deg)`;
        } else {
            const leds = document.querySelectorAll('.led');
            leds.forEach((l, idx) => {
                l.classList.toggle('active', idx === (beatInMeasure % 4)); 
            });
        }
    }

    function scheduler() {
        while (nextTickTime < audioCtx.currentTime + 0.1) {
            playSound(nextTickTime, currentTick);
            nextTickTime += (60.0 / bpm);
            currentTick++;
        }
        timerID = requestAnimationFrame(scheduler);
    }

    /* --- 템포 조절 함수 --- */
    function updateBpm(newVal) {
        bpm = Math.min(Math.max(newVal, 40), 250); // 범위 제한
        tempoRange.value = bpm;
        mainBpm.innerText = bpm;
    }

    document.getElementById('tempoMinus').addEventListener('click', () => updateBpm(parseInt(bpm) - 1));
    document.getElementById('tempoPlus').addEventListener('click', () => updateBpm(parseInt(bpm) + 1));
    tempoRange.addEventListener('input', (e) => updateBpm(e.target.value));

    /* --- 모드 및 버튼 설정 --- */
    document.getElementById('btnAnalog').addEventListener('click', function() {
        currentMode = 'analog';
        document.getElementById('analog-view').style.display = 'flex';
        document.getElementById('digital-view').style.display = 'none';
        this.classList.add('active');
        document.getElementById('btnDigital').classList.remove('active');
    });

    document.getElementById('btnDigital').addEventListener('click', function() {
        currentMode = 'digital';
        document.getElementById('analog-view').style.display = 'none';
        document.getElementById('digital-view').style.display = 'flex';
        this.classList.add('active');
        document.getElementById('btnAnalog').classList.remove('active');
    });

    document.getElementById('clickToggle').addEventListener('click', function() {
        isSameSound = !isSameSound;
        this.classList.toggle('active', isSameSound);
    });

    const timeBtns = document.querySelectorAll('#timeBtns .btn');
    timeBtns.forEach(b => b.addEventListener('click', function() {
        document.querySelector('#timeBtns .active').classList.remove('active');
        this.classList.add('active');
        measure = parseInt(this.dataset.val);
        currentTick = 0;
    }));

    startBtn.addEventListener('click', () => {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        isPlaying = !isPlaying;
        if (isPlaying) {
            currentTick = 0;
            nextTickTime = audioCtx.currentTime;
            scheduler();
            startBtn.innerText = 'STOP';
        } else {
            cancelAnimationFrame(timerID);
            startBtn.innerText = 'START';
            document.querySelectorAll('.led').forEach(l => l.classList.remove('active'));
            needle.style.transform = `translateX(-50%) rotate(0deg)`;
        }
    });
</script>

</body>
</html>
